name: Déploiement de l'application web Frontend - RockPlay

on:
  push:
    branches: [production]

env:
  CI: false
  PM2_NAME: front-rockplay
  APP_NAME: Frontend RockPlay
  PROJECT_PATH: /var/www/frontend/Frontend-Rockplay
  PROJET_TYPE: frontend

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Vérifier les secrets nécessaires
        run: |
          if [ -z "${{ secrets.SERVER_IP }}" ] || [ -z "${{ secrets.SERVER_USER }}" ] || [ -z "${{ secrets.SERVER_SSH_KEY }}" ]; then
            echo "::error::Les secrets SERVER_IP, SERVER_USER ou SERVER_SSH_KEY ne sont pas configurés"
            exit 1
          fi

      - name: Ajouter la clé SSH connue
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Récupérer le code depuis le dépôt
        uses: actions/checkout@v3
        with:
          path: frontend

      - name: Vérifier la structure du dépôt après checkout
        run: |
          echo "==== Structure complète après checkout ===="
          tree -L 3 frontend || ls -R frontend

      - name: Configurer Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Installer les dépendances
        run: |
          cd frontend
          npm install --force

      - name: Construire l'application
        run: |
          cd frontend
          npm run build

      - name: Vérifier le contenu du dossier build local (GitHub)
        run: ls -la frontend/build

      - name: Préparer la structure des dossiers sur le serveur
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "=== Vérification de la structure des dossiers ==="
            sudo mkdir -p ${{ env.PROJECT_PATH }}/build
            sudo chown -R ${{ secrets.SERVER_USER }}:${{ secrets.SERVER_USER }} /var/www/${{ env.PROJET_TYPE }}
            echo "=== Nettoyage de l'ancien build ==="
            rm -rf ${{ env.PROJECT_PATH }}/build/*
            echo "Structure des dossiers préparée"

      - name: Transférer le dossier build sur le serveur
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "frontend/build/"
          target: "${{ env.PROJECT_PATH }}/build/"
          strip_components: 1
          overwrite: true

      - name: Vérifier le transfert sur le serveur
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "=== Vérification du déploiement ==="
            ls -la ${{ env.PROJECT_PATH }}/build
            echo "=== Redémarrage de nginx ==="
            sudo systemctl restart nginx
            echo "✓ Déploiement réussi !"




  notification:
    needs: deploy-frontend
    runs-on: ubuntu-latest
    environment: production
    if: always()
    steps:
      - name: Construire la liste des destinataires
        id: recipients
        run: |
          recipients="${{ vars.SMTP_TO }}"
          echo "allEmails=$recipients" >> $GITHUB_OUTPUT
          echo "Liste des destinataires : $recipients"

      - name: Email succès
        if: ${{ needs.deploy-frontend.result == 'success' && steps.recipients.outputs.allEmails != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ vars.SMTP_HOST }}
          server_port:  ${{ vars.SMTP_PORT }}
          subject: "🎉 Déploiement réussi : ${{ env.APP_NAME }}"
          body: |
            ✅ L’application frontend : ${{ env.APP_NAME }} a été déployée avec succès !

            Détails du déploiement :
            🔧 Workflow: ${{ github.workflow }}
            🔖 Commit: ${{ github.sha }}
            🌿 Branche: ${{ github.ref }}
            🔄 Exécution : ${{ github.run_id }}
            
            Tout fonctionne parfaitement ! 👍
          username: ${{ vars.SMTP_USERNAME }}
          from: ${{ vars.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          to: ${{ steps.recipients.outputs.allEmails }}

      - name: Email échec
        if: ${{ needs.deploy-frontend.result == 'failure' && steps.recipients.outputs.allEmails != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ vars.SMTP_HOST }}
          server_port: ${{ vars.SMTP_PORT }}
          subject: "❌ Déploiement : ${{ env.APP_NAME }} échoué ❌"
          body: |
            ❌ Le déploiement a échoué : ${{ env.APP_NAME }}.

            Détails :
            🔧 Workflow: ${{ github.workflow }}
            🔖 Commit: ${{ github.sha }}
            🌿 Branche: ${{ github.ref }}
            🔄 Exécution : ${{ github.run_id }}

            Consultez les logs ici :
            👉 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Merci de vérifier les erreurs. 🙏
          username: ${{ vars.SMTP_USERNAME }}
          from: ${{ vars.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          to: ${{ steps.recipients.outputs.allEmails }}

      - name: Pas de notification envoyée
        if: ${{ steps.recipients.outputs.allEmails == '' }}
        run: echo "Aucun email envoyé, aucune adresse définie."
